[Main]
; Enable or disable the entire mod functionality (Default: true)
; 모드 기능 전체 활성화 여부 (기본값: true)
bEnabled = true

; Toggle hotkey DXScanCode (Default: 68 [F10])
; 기능을 켜고 끌 단축키의 DXScanCode (기본값: 68 [F10])
; DXScanCode reference: https://ck.uesp.net/wiki/Input_Script
uToggleKey = 68

; Manual Reset hotkey DXScanCode (Default: 88 [F12])
; 수동으로 물리 리셋을 수행할 단축키의 DXScanCode (기본값: 88 [F12])
; Note: If the weapon is drawn, sheathing it will be prioritized.
; 참고: 무기를 들고 있다면 무기를 넣는 동작을 우선적으로 수행합니다.
uManualResetKey = 88

; Allow auto-reset while weapon is drawn (Default: false)
; 무기를 꺼낸 상태에서 자동 리셋 허용 여부 (기본값: false)
; Set to false to prevent disruption during combat. (Applies to SyncAnim, SlowMo, ScriptedScenes)
; false인 경우 전투 중 방해를 방지하기 위해 자동 리셋을 수행하지 않습니다. (SyncAnim, 슬로우, 스크립트 씬에 적용)
bWeaponDrawnReset = false

; Reset physics on Cell Transition (Default: true)
; 셀 이동(장소 이동) 시 물리 리셋 수행 여부 (기본값: true)
; User set to false.
bCellTransitionReset = false

; Enable support for Followers (Player Teammates) (Default: false)
; 팔로워(동료)에게도 플레이어와 동일한 리셋 로직 적용 여부 (기본값: false)
; User set to false.
bFollowerSupport = false

; Reset follower physics on Teleport (Default: true)
; 팔로워가 플레이어 근처로 순간이동할 때 물리 리셋 수행 여부 (기본값: true)
bFollowerTeleportReset = true

[Triggers]
; Reset physics on Sync Animations (KillMoves, Paired Attacks, etc.) Enter/Exit
; 동기화 애니메이션(킬무브, 페어 공격 등) 발생 시작/종료 시 리셋 여부
bSyncAnimEnter = true
bSyncAnimExit = true

; Reset physics when using Furniture (Chairs, Beds, etc.) Enter/Exit
; 가구(의자, 침대 등) 사용 시작/종료 시 리셋 여부
bFurnitureEnter = true
bFurnitureExit = true

; Reset physics when Mounting/Dismounting Enter/Exit
; 승마 시작/하차 시 리셋 여부
bRidingEnter = true
bRidingExit = true

; Reset physics on Scripted Scenes (Loss of control) Enter/Exit
; 스크립트 씬(조작권 상실) 발생 시작/종료 시 리셋 여부
bScriptedSceneEnter = false
bScriptedSceneExit = false

; Reset physics when Slow Motion ends (default: false)
; 슬로우 모션 종료 시 리셋 여부
bSlowMoReset = false

[Delay]
; Delay in seconds before triggering the forceful reset on Enter events.
; 진입(Enter) 이벤트 발생 시 물리 리셋을 지연시킬 시간(초)입니다. 애니메이션 굳힘 방지용입니다. 1.0 = 1초
fSyncAnimEnterDelay = 0.5
fFurnitureEnterDelay = 0.5
fRidingEnterDelay = 0.5
fScriptedSceneEnterDelay = 0.5

; Delay in seconds before triggering the forceful reset on Cell Transition events.
; 셀 이동(장소 이동) 시 리셋을 수행하기 전 지연 시간(초)입니다.
fCellTransitionDelay = 0.5

; Delay in seconds before triggering the forceful reset on Follower Teleport events.
; 팔로워 순간이동 감지 시 리셋을 수행하기 전 지연 시간(초)입니다.
fFollowerTeleportDelay = 0.5

; Follower Teleport detection threshold in units (Default: 500.0)
; 팔로워 순간이동으로 간주할 이동 거리 임계값 (기본값: 500.0)
fTeleportThreshold = 500.0


[Debug]
; Enable logging (Data/SKSE/Logs/AutoPhysicsReset.log) (default: false)
; 로그 활성화 여부 (Data/SKSE/Logs/AutoPhysicsReset.log)
bEnableLog = false
