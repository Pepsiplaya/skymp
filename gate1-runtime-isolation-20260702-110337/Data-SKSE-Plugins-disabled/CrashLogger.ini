; ============================================================================
; Crash Log Settings
; ============================================================================
; These settings control how crash logs are generated and shared when the
; game crashes unexpectedly.
; ============================================================================


[Debug]

;Local symbol cache directory for PDB symbols (speeds up crash log generation). Default: c:\symcache
Symcache Directory = 

; Crashlog output directory. If blank, defaults to "Documents\my games\Skyrim Special Edition\SKSE\"
Crashlog Directory = 

;Maximum number of crash logs to keep. Oldest logs will be deleted when this limit is exceeded. Default: 20
;Set to 0 to disable log cleanup (keep all logs).
Max Crash Logs = 20

;Maximum number of minidump files to keep. Minidumps are very large, so a low limit is recommended. Default: 1
;Set to 0 to disable minidump cleanup.
Max Minidumps = 1

;Automatically open the crash log with the default text viewer after a crash. Default: true
Auto Open Crash Log = true

;Automatically upload crash log to pastebin.com and open URL in browser. Requires Pastebin API Key. Great for sharing crash logs with mod authors! Default: false
Auto Upload Crash Log = false

;Get your free API key from https://pastebin.com/doc_api#1 (required for auto upload).
;1. Create free account at pastebin.com  2. Get API key from link  3. Paste it here. Default: empty
Pastebin API Key = 

;Enable thread dump hotkey for diagnosing hangs/deadlocks. Default: true
;When enabled, press Ctrl+Shift+F12 while game is frozen to generate dump.
;Set to 0 to disable (no monitoring thread will be created).
Enable Thread Dump Hotkey = true

;Hotkey combination (VK codes): Ctrl=17, Shift=16, F12=123. Default: 17, 16, 123
;VK code reference: https://learn.microsoft.com/en-us/windows/win32/inputdev/virtual-key-codes
Thread Dump Hotkey = 

;Enable heap allocation analysis for crash pointers. Default: false
;WARNING: Can cause 10+ second delays in crash log generation. Only enable if needed.
Enable Heap Analysis = false

;Maximum number of heaps to check (process has many heaps). Default: 1
;1 = only check process heap (fastest, limited coverage)
;2-5 = check multiple heaps (slower, better coverage)
;0 = check all heaps (VERY SLOW, not recommended)
Max Heaps To Check = 1

;Maximum allocations to check per heap before giving up. Default: 1000
;Lower = faster but may miss allocations. Higher = slower but more thorough.
;0 = unlimited (VERY SLOW, not recommended)
Max Heap Iterations Per Heap = 1000
; Thread context detection: each line defines label and its trigger keywords (comma-separated)
Thread Context Papyrus VM = BSScript, Papyrus, VirtualMachine
Thread Context Havok/Physics = hkp, Havok, bhk, hkb
Thread Context Rendering = Render, BSRender, BSShader, NiCamera
Thread Context Audio = Audio, XAudio, BSAudio, SoundHandle
Thread Context Job/Task = Job, Task, JobList, ServingThread

;Also create minidump file (.dmp) for crash log WinDbg analysis. Default: false
;WARNING: Minidumps are VERY LARGE (500MB-2GB+) and only useful for advanced debugging with WinDbg.
;Only enable if a mod author specifically requests a minidump.
Crash Log Write Minidump = false

;Also create minidump file (.dmp) for thread dump WinDbg analysis. Default: false
;WARNING: Minidumps are VERY LARGE (500MB-2GB+) and only useful for advanced debugging with WinDbg.
;Only enable if a mod author specifically requests a minidump.
Thread Dump Write Minidump = false

;Log level of messages to buffer for printing: trace = 0, debug = 1, info = 2, warn = 3, err = 4, critical = 5, off = 6. Default: 0
Log Level = 2

;Log level to force messages to print from buffer. Default: 0
Flush Level = 0

;Enable if using VisualStudio to debug CrashLogger itself. Default: false
;Set false otherwise because Crashlogger will not produce a crash until the debugger is detected.
Wait for Debugger for Crash = false
