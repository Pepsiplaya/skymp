# DELETE THIS FILE AND RUN THE GAME IF YOU WANT TO REGENERATE THE DEFAULT SETTINGS


#  Here you can set which menus you want to be paused or unpaused.
[UNPAUSED_MENUS]
bBarterMenu = true
bBookMenu = true
bConsole = true
bContainerMenu = true
bFavoritesMenu = true
bGiftMenu = true
bInventoryMenu = true
bJournalMenu = true
bLevelUpMenu = true
bLockpickingMenu = true
bMagicMenu = true
bMapMenu = true
bMessageBoxMenu = true
bModManagerMenu = true
bSleepWaitMenu = true
bStatsMenu = true
bTrainingMenu = true
bTutorialMenu = true
bTweenMenu = true
bCustomMenu = true
bQuestJournalOverhaul_QuestMenu = true
bDragonbornsBestiary_BestiaryMenu = true

# If true, all affected menus will be paused if the player is in combat. The console is not affected.
bPauseDuringCombat = false


[AUTOCLOSE]

#  Auto close menus if the distance to the object is larger than the specified value.
bAutoCloseMenus = true

#  The maximum distance (in in-game units) before the menus will automatically close.
#  Too small values can cause the menus to close unexpectedly.
fAutoCloseDistance = 400.000000

#  The maximum distance (in in-game units) where the menus NEVER auto-close (in relation to the players initial position when the menu was opened).
#  This is used as a failsafe when the initial distance is larger than the maximum allowed to prevent the menu from closing immediately (e.g. a container opened by a script).
fAutoCloseTolerance = 100.000000


[DATA_UPDATES]

#  Actor value meter update divisor for the bottom bar. The bar updates only when the value crosses 1/divisor of the maximum. 0 updates on any change.
iBottomBarMeterUpdateSteps = 100
bUpdateInventoryMenuBottomBar = true
bUpdateContainerMenuBottomBar = true
bUpdateContainerMenuPickpocketChance = true
bUpdateMagicMenuBottomBar = true
bUpdateMagicMenuActiveEffectTimers = true
bUpdateStatsMenuPlayerInfo = true
bUpdateStatsMenuSkillList = true
bUpdateTweenMenuBottomBar = true
bUpdateJournalMenuBottomBar = true
bUpdateMapMenuBottomBar = true
bUpdateSleepWaitMenuClock = true
bUpdateQuestJournalOverhaulQuestMenuPlayerInfo = true


[CONTROLS]

# If enabled, you will be able to move when a menu is open. Use the mouse (or the D-pad on controllers) to navigate the menus.
#  (For controllers users) To change tabs in SkyUI favorites menu, use LB and RB buttons.
bEnableMovementInMenus = true

# Allows "Toggle walk/run" control to be available when in menus (Caps Lock by default).
bEnableToggleRun = false

# If enabled, you will be able to move the camera when using controllers. To rotate items in the inventory, maximize the preview first by pressing on the thumb stick.
bEnableGamepadCameraMove = true

# If enabled, you will be able to move the camera with the mouse by moving it to the edge of the screen (similar to how it works in the dialogue menu).
bEnableCursorCameraMove = true

# The vertical and horizontal speed the camera moves when bEnableCursorCameraMove is enabled.
fCursorCameraVerticalSpeed = 0.150000
fCursorCameraHorizontalSpeed = 0.250000

# Gamepad button id used to switch to the previous tab in the SkyUI favorites menu. Default is LB (274).
iFavoritesTabLeft = 274

# Gamepad button id used to switch to the next tab in the SkyUI favorites menu. Default is RB (275).
iFavoritesTabRight = 275


[SLOWMOTION]

# This is the multiplier that will affect the game speed when a menu is open.
# Default is 0.3, which is 30% of the full speed
# Values lower than 0.25-0.3 can cause physics issues and are not recommended.
# This feature also doesn't play nice with other sources of slowdowns, as it won't stack properly (like potion effects or the Slow Time shout).
fSlowMotionMultiplier = 0.300000

# If enabled, slow-motion will only be applied when the player is in combat.
bSlowMotionCombatOnly = false

#  Enable or disable slow-motion when a menu is open. Configurable on a per-menu basis.
bEnableSlowMotion_BarterMenu = false
bEnableSlowMotion_BookMenu = false
bEnableSlowMotion_ContainerMenu = false
bEnableSlowMotion_FavoritesMenu = false
bEnableSlowMotion_GiftMenu = false
bEnableSlowMotion_InventoryMenu = false
bEnableSlowMotion_JournalMenu = false
bEnableSlowMotion_LevelUpMenu = false
bEnableSlowMotion_LockpickingMenu = false
bEnableSlowMotion_MagicMenu = false
bEnableSlowMotion_MapMenu = false
bEnableSlowMotion_MessageBoxMenu = false
bEnableSlowMotion_ModManagerMenu = false
bEnableSlowMotion_SleepWaitMenu = false
bEnableSlowMotion_StatsMenu = false
bEnableSlowMotion_TrainingMenu = false
bEnableSlowMotion_TutorialMenu = false
bEnableSlowMotion_TweenMenu = false
bEnableSlowMotion_CustomMenu = false
bEnableSlowMotion_QuestJournalOverhaul_QuestMenu = false
bEnableSlowMotion_DragonbornsBestiary_BestiaryMenu = false


# Shows a blinking red overlay when your character is in combat. Especially useful in full screen menus. You can enable or disable it individually for each menu.
[COMBAT_ALERT_OVERLAY]
bShowCAO_BarterMenu = true
bShowCAO_BookMenu = true
bShowCAO_ContainerMenu = true
bShowCAO_DialogueMenu = true
bShowCAO_FavoritesMenu = true
bShowCAO_GiftMenu = true
bShowCAO_InventoryMenu = true
bShowCAO_JournalMenu = true
bShowCAO_LevelUpMenu = true
bShowCAO_LockpickingMenu = true
bShowCAO_MagicMenu = true
bShowCAO_MapMenu = true
bShowCAO_MessageBoxMenu = true
bShowCAO_ModManagerMenu = true
bShowCAO_SleepWaitMenu = true
bShowCAO_StatsMenu = true
bShowCAO_TrainingMenu = true
bShowCAO_TutorialMenu = true
bShowCAO_TweenMenu = true
bShowCAO_CustomMenu = true
bShowCAO_QuestJournalOverhaul_QuestMenu = true
bShowCAO_DragonbornsBestiary_BestiaryMenu = true


[HUD]

# If set to true, SkyrimSouls will not attempt to modify the location of the sneak meter. Use it if you have a compatibility issue with something
bDisableHUDModifications = false

# The position where the sneak meter will appear on the screen when a menu is open. It's necessary as some menu elements would hide it otherwise (eg. lockpicking).
# The values are a bit arbitrary so just try different values until you find what suits you.
fSneakMeterPosX = 24.000000
fSneakMeterPosY = 120.000000


[BLUR]

# If this is enabled, background blur will be disabled in menus
bDisableBlur = false


[MESSAGES]

# Disables the warning message on startup if Engine Fixes is not detected.
bHideEngineFixesWarning = false


[MAP_MENU]

# If enabled, the map menu looping ambient sound will play as normal. By default it is disabled since the game world is unpaused and both would play simultaneously.
bMapMenuAmbientSoundLoop = false

# If enabled, the map menu will use a separate sky/weather state decoupled from the real world weather.
# This prevents the map from affecting gameplay (e.g. weather changes, precipitation), but it can be invasive.
# Highly recommended to keep it enabled, but can be disabled if it conflicts with something.
bMapMenuCustomSky = true
